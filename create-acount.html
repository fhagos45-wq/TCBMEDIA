<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCB Academy | Join Us</title>
    <link rel="stylesheet" href="create-acount.css">
    <!-- Google Fonts for a professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-wrapper">
        <div class="brand-section">
            <h1>TCB Academy</h1>
            <p>Mastering Technology & Language</p>
        </div>
        
        <div class="form-section">
            <h2>Create Account</h2>
            <p class="subtitle">Start your journey with us today</p>
            
            <form>
                <div class="input-box">
                    <input type="text" required>
                    <label>Full Name</label>
                </div>
                <div class="input-box">
                    <input type="email" required>
                    <label>Email Address</label>
                </div>
                <div class="input-box">
                    <input type="password" required>
                    <label>Password</label>
                </div>
                
                <button type="submit" class="glow-button">Register Now</button>
            </form>
            
            <div class="login-link">
                Already a member? <a href="#">Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
