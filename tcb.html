<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCB News | Authentication Portal</title>
    <link rel="stylesheet" href="tcb.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="site-container">
    <header class="top-bar">
        <div class="content-wrapper header-inner">
            <img src="tigraytcb.png" alt="TCB Logo" class="nav-logo">
            <nav class="navigation">
                <div class="user-actions">
                    <button onclick="showForm('login')" class="btn-outline">Login</button>
                    <button onclick="showForm('register')" class="btn-fill">Join Now</button>
                </div>
            </nav>
        </div>
    </header>

    <div class="content-wrapper body-grid">
        <aside class="side-panel left-panel">
            <div class="ad-label-top">ADVERTISEMENT</div>
            <div class="ad-content-box"><p>Promoted Content</p></div>
        </aside>

        <main class="center-news">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button id="tab-register" class="tab-btn active" onclick="showForm('register')">Register</button>
                    <button id="tab-login" class="tab-btn" onclick="showForm('login')">Login</button>
                </div>

                <div id="registration-section" class="form-wrapper">
                    <div class="form-header">
                        <h2>Create Account</h2>
                        <p>Join the TCB community today.</p>
                    </div>
                    <form id="tcbRegistrationForm">
                        <div class="input-group">
                            <label><i class="fas fa-user"></i> Full Name</label>
                            <input type="text" name="fullname" placeholder="John Doe" required>
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" name="email" placeholder="email@example.com" required>
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" name="password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn-submit">Sign Up</button>
                    </form>
                </div>

                <div id="login-section" class="form-wrapper" style="display: none;">
                    <div class="form-header">
                        <h2>Welcome Back</h2>
                        <p>Access your TCB dashboard.</p>
                    </div>
                    <form id="tcbLoginForm">
                        <div class="input-group">
                            <label><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" name="loginEmail" placeholder="email@example.com" required>
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" name="loginPassword" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn-submit">Login</button>
                    </form>
                </div>
            </div>
        </main>

        <aside class="side-panel right-panel">
            <div class="ad-label-top">PARTNERS</div>
            <div class="ad-content-box"><p>Partner Ads</p></div>
        </aside>
    </div>

    <footer class="main-footer">
        <div class="content-wrapper footer-flex">
            <p>© 2026 TCB Platform | Connecting the world.</p>
            <div class="social-box">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="tcb.js"></script>
</body>
</html>
