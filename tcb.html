<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCB Media | Premium Experience</title>
    <link rel="stylesheet" href="tcb.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="site-container">
    <header class="premium-header">
        <div class="content-wrapper header-inner">
            <img src="tigraytcb.png" alt="TCB Logo" class="nav-logo">
            <nav class="navigation">
                <button onclick="showForm('login')" class="btn-login">Sign In</button>
                <button onclick="showForm('register')" class="btn-signup">Join Now</button>
            </nav>
        </div>
        <div class="header-wave">
            <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" class="shape-fill"></path>
            </svg>
        </div>
    </header>

    <div class="content-wrapper body-grid">
        <aside class="side-panel left-ad">
            <div class="glass-ad">AD SPACE</div>
        </aside>

        <main class="main-content">
            <div class="auth-box">
                <div class="auth-tabs">
                    <button id="tab-register" class="active" onclick="showForm('register')">New Account</button>
                    <button id="tab-login" onclick="showForm('login')">Welcome Back</button>
                </div>

                <div class="form-container">
                    <section id="registration-section">
                        <form id="tcbRegistrationForm">
                            <div class="input-wrap">
                                <label>Full Name</label>
                                <input type="text" name="fullname" placeholder="Enter your name" required>
                            </div>
                            <div class="input-wrap">
                                <label>Email</label>
                                <input type="email" name="email" placeholder="you@example.com" required>
                            </div>
                            <div class="input-wrap">
                                <label>Password</label>
                                <input type="password" name="password" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="glow-button">Create Account</button>
                        </form>
                    </section>

                    <section id="login-section" style="display: none;">
                        <form id="tcbLoginForm">
                            <div class="input-wrap">
                                <label>Email Address</label>
                                <input type="email" name="loginEmail" placeholder="you@example.com" required>
                            </div>
                            <div class="input-wrap">
                                <label>Password</label>
                                <input type="password" name="loginPassword" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="glow-button">Login</button>
                        </form>
                    </section>
                </div>
            </div>
        </main>

        <aside class="side-panel right-ad">
            <div class="glass-ad">PARTNERS</div>
        </aside>
    </div>

    <footer class="premium-footer">
        <div class="footer-wave">
            <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" class="shape-fill"></path>
            </svg>
        </div>
        <div class="content-wrapper footer-content">
            <div class="footer-info">
                <img src="tigraytcb.png" alt="TCB Logo" class="footer-logo">
                <p>Leading the digital revolution in media and education.</p>
            </div>
            <div class="footer-links">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="#"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="tcb.js"></script>
</body>
</html>
