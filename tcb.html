<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCB News | Premium Split Layout</title>
    <link rel="stylesheet" href="tcb.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="site-container">
    <header class="top-bar">
        <div class="content-wrapper header-inner">
            <img src="tigraytcb.png" alt="TCB Logo" class="nav-logo">
            
            <nav class="navigation">
                <div class="user-actions">
                    <a href="https://fhagos45-wq.github.io/TCBMEDIA/tcbhome/tcb-home.html" class="btn-outline">Login</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="content-wrapper body-grid">
        
        <aside class="side-panel left-panel">
            <div class="ad-label-top">ADVERTISEMENT</div>
            <div class="ad-content-box">
                <p>Space for your Ads</p>
            </div>
        </aside>

        <main class="center-news">
            <div class="news-header-title">
                <h2><i class="fas fa-user-plus"></i> Join TCB Platform</h2>
            </div>
            
            <section class="registration-section">
                <form id="tcbRegistrationForm">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" name="fullname" placeholder="Enter your name" required>
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Create a password" required>
                    </div>
                    <button type="submit" class="btn-fill">Create My Account</button>
                </form>
            </section>

            <article class="mini-news" style="margin-top: 30px;">
                <h3>Academy Updates: Online Learning</h3>
                <p>New courses are now live on the TCB Academy platform.</p>
            </article>
        </main>

        <aside class="side-panel right-panel">
            <div class="ad-label-top">PARTNERS</div>
            <div class="ad-content-box">
                <p>Partner Promotions</p>
            </div>
        </aside>

    </div>

    <footer class="main-footer">
        <div class="content-wrapper footer-flex">
            <div class="footer-left">
                <img src="tigraytcb.png" alt="TCB Logo" class="footer-logo">
                <p>Connecting the world through TCB News and Academy.</p>
            </div>
            <div class="footer-right">
                <div class="social-box">
                    <a href="https://www.facebook.com/"><i class="fab fa-facebook"></i></a>
                    <a href="https://www.youtube.com/"><i class="fab fa-youtube"></i></a>
                    <a href="https://www.tiktok.com/"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
        <div class="bottom-bar">
            <p>© 2026 TCB Platform | All Rights Reserved</p>
        </div>
    </footer>
</div>


    <script src="tcb.js"></script>
</body>
</html>
